# IBC Egress Quick Reference
# Based on IBC 2021 — verify jurisdiction has adopted this edition

occupant_load_factors:
  # Table 1004.5 — Area per occupant (SF per person)
  assembly_concentrated: 7      # chairs, no tables
  assembly_standing: 5
  assembly_unconcentrated: 15   # tables and chairs
  business: 150
  educational_classroom: 20
  educational_shops: 50
  industrial: 100
  institutional_sleeping: 120
  institutional_treatment: 240
  mercantile_basement: 30
  mercantile_ground: 60
  mercantile_upper: 60
  residential: 200
  storage: 300
  warehouse: 500
  library_reading: 50
  library_stacks: 100
  exercise_rooms: 50
  stages: 15
  kitchens_commercial: 200
  parking_garage: 200
  swimming_pool: 50
  swimming_pool_deck: 30

exits_required:
  # Table 1006.3.1
  "1-500": 2
  "501-1000": 3
  "over_1000": 4

exit_width:
  # Section 1005.1
  stairways: "0.3 inches per occupant (sprinklered) / 0.2 per occupant (unsprinklered)"
  other_egress: "0.2 inches per occupant (sprinklered) / 0.15 per occupant (unsprinklered)"
  minimum_door: "32 inches clear"
  minimum_corridor: "44 inches (except: 36 inches if serving <50 occupants)"

travel_distance:
  # Table 1017.2 — Maximum travel distance to exit (feet)
  # Format: [unsprinklered, sprinklered]
  assembly: [200, 250]
  business: [200, 300]
  educational: [200, 250]
  factory_low_hazard: [300, 400]
  factory_moderate: [200, 250]
  high_hazard: [75, 75]
  institutional: [200, 250]
  mercantile: [200, 250]
  residential: [200, 250]
  storage_low_hazard: [300, 400]
  storage_moderate: [200, 250]
  utility: [300, 400]

dead_end_corridors:
  # Section 1020.4
  general: "20 feet max"
  sprinklered_B_F_S: "50 feet"
  sprinklered_other: "20 feet"

common_path_of_egress:
  # Table 1006.2.1 — Max common path (feet)
  # [unsprinklered, sprinklered]
  assembly: [20, 75]
  business: [100, 100]
  educational: [75, 75]
  factory: [75, 100]
  institutional: [100, 100]
  mercantile: [75, 100]
  residential: [125, 125]
  storage: [100, 100]

exit_separation:
  # Section 1007.1.1
  unsprinklered: "1/2 of the maximum overall diagonal dimension"
  sprinklered: "1/3 of the maximum overall diagonal dimension"

corridor_fire_rating:
  # Table 1020.1 — Corridor fire-resistance rating (hours)
  # Format: [unsprinklered, sprinklered]
  assembly_over_30: [1, 0]
  business: [0, 0]
  educational: [1, 0]
  factory_storage: [1, 0]
  high_hazard: [1, 1]
  institutional_I2: [0, 0]
  institutional_I3: [1, 1]
  mercantile: [1, 0]
  residential: [0.5, 0]

stairway_requirements:
  min_width: "44 inches (36 if serving <50 occupants)"
  max_riser: "7 inches"
  min_riser: "4 inches"
  min_tread: "11 inches"
  headroom: "80 inches min"
  handrail_height: "34 to 38 inches"
  handrail_extensions: "12 inches at top, one tread depth + 12 inches at bottom"
  landings: "Width equal to stair width, depth equal to stair width (max 48 required)"

door_requirements:
  max_leaf_width: "48 inches"
  min_clear_width: "32 inches"
  min_height: "80 inches"
  max_force_interior: "5 lbs"
  swing_direction: "In direction of egress when serving 50+ occupants"
  panic_hardware: "Required for A and E occupancies with 50+ occupants"
