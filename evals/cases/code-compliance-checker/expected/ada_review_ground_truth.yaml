# ADA Accessibility Compliance Ground Truth - Holabird Academy PK-8
# Source: A-3.2 (Door Schedule), A-3.1 (Finish Schedule), project context
# Project: Holabird Academy, Baltimore, Maryland
# Applicable: ADA/ANSI A117.1-2009, Maryland Accessibility Code (COMAR)
# Verification: schedule-derived + code-calculated, floor-plan-visual-pending

project:
  name: "Holabird Academy PK-8"
  location: "Baltimore, Maryland"
  building_type: "K-8 Public School (new construction)"
  ada_standard: "ADA/ANSI A117.1-2009"
  state_requirements: "Maryland Accessibility Code (COMAR 05.02.02) — generally follows ADA with some additional requirements"

findings:
  - id: CC-A001
    area: ADA - Door Clear Width
    code_ref: "ADA 404.2.3 / ANSI A117.1 Section 404.2.3"
    requirement: "Minimum 32 inches clear width at doors (measured with door open 90 degrees)"
    observed: "Standard doors: 3'-0\" (36\") nominal = ~34\" clear — compliant. Narrow doors: none below 3'-0\" except specialty overhead coiling doors (1271, 1414, 1608A — service counters, not passage doors)."
    status: COMPLIANT
    severity: INFO
    notes: "All passage doors meet minimum clear width."

  - id: CC-A002
    area: ADA - Accessible Restrooms
    code_ref: "ADA 213.2, 603, 604"
    requirement: "At least one accessible restroom per floor. 60-inch turning space, grab bars 33-36 inches AFF, lavatory knee clearance."
    observed: "Multiple restrooms per floor: 1009, 1101, 1210, 1301, 1302, 1400, 1410, 1607, 1710A, 1802B, 1803A, 1805A, 1900A, plus PK-2 toilets (1807A, 1808A, etc.). Floor plan review needed to verify accessible layout."
    status: REVIEW_NEEDED
    severity: HIGH
    notes: "Door schedule confirms restrooms exist on both floors. Verify at least one per cluster meets full ADA requirements (60\" turn radius, grab bars, mirror height). PK-2 toilets may have child-height fixtures — verify ADA-accessible toilet still provided."

  - id: CC-A003
    area: ADA - Elevator
    code_ref: "ADA 206.2.3, 407"
    requirement: "Multi-story public building must have at least one accessible elevator. Minimum car size 54\" x 80\", 36\" door width."
    observed: "Elevator E1 present in finish schedule. Door 2207 (Elevator Control) is 3'-6\" wide. Elevator present — verify car dimensions on floor plan."
    status: REVIEW_NEEDED
    severity: HIGH
    notes: "Elevator exists. Verify car dimensions meet ADA minimums and that accessible route connects to elevator on both floors."

  - id: CC-A004
    area: ADA - Accessible Route
    code_ref: "ADA 206.2, 403"
    requirement: "Accessible route minimum 36 inches wide, 60 inches at passing spaces, connecting all accessible spaces."
    observed: "Corridors C100-C230 span both floors. Corridor doors are 3'-0\" (standard) or wider. Ramp RA21 present in finish schedule."
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Ramp RA21 (Ramp 2) confirms level changes are addressed. Verify ramp slope (max 1:12), landing dimensions, and handrails on floor plan."

  - id: CC-A005
    area: ADA - Door Maneuvering Clearance
    code_ref: "ADA 404.2.4"
    requirement: "Pull side: 60 inches min depth, 18 inches min latch side. Push side: 48 inches min depth for latch approach."
    observed: "Cannot verify from schedule — requires floor plan dimension check at each door."
    status: REVIEW_NEEDED
    severity: HIGH
    notes: "Critical check for tight spaces: storage rooms (1005, 1010, 1102A, 1203, etc.), restroom entries, and custodial closets. These are the most common ADA violations in schools."

  - id: CC-A006
    area: ADA - Signage
    code_ref: "ADA 216, 703"
    requirement: "Room signs: raised characters + Braille, mounted 48-60 inches AFF on latch side. Exit signs: tactile at each exit door."
    observed: "A-3.1 Finish Schedule includes detailed signage notes with ADA requirements: raised 1/32\" text, Grade 2 Braille, tactile exit signs at every exit door, minimum character heights specified."
    status: COMPLIANT
    severity: INFO
    notes: "Signage notes on A-3.1 are comprehensive and appear to address ADA signage requirements including Braille, tactile characters, and exit signs."

  - id: CC-A007
    area: ADA - Accessible Parking
    code_ref: "ADA 208, 502"
    requirement: "Minimum accessible parking spaces based on total count. Van-accessible spaces required."
    observed: "Parking shown on civil/site plan (C-series sheets) — not reviewed in this architectural scope."
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Defer to civil/landscape review (C-series sheets). Verify accessible space count meets ADA Table 208.2."

  - id: CC-A008
    area: ADA - Classroom Accessibility
    code_ref: "ADA 221, Maryland COMAR 13A.02.03"
    requirement: "All classrooms accessible. Wheelchair turning space in each classroom. Accessible teacher workstation."
    observed: "30+ classrooms (Grades 1-8, Pre-K, Kindergarten, Science Lab, Art Studio, Tech Ed Lab). All have standard 3'-0\" doors. Floor plan review needed for internal layout."
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Verify wheelchair turning space exists in each classroom, especially smaller rooms like 1001 (A.P. Office), 1204 (Social Worker), 1205 (Psychologist)."

  - id: CC-A009
    area: ADA - Gymnasium Accessibility
    code_ref: "ADA 206.2.12, 1009"
    requirement: "Accessible route to all areas of sport activity. Wheelchair seating positions in assembly areas."
    observed: "Gymnasium 1500: main doors 8'-0\" wide (HG type), accessible via corridor. Secondary doors to vestibule and storage."
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Verify: accessible route to gym floor, accessible spectator seating, accessible locker/shower (rooms 1805F-H have shower/toilet finishes)."

summary:
  total_findings: 9
  compliant: 2
  review_needed: 7
  non_compliant: 0
  notes: "Most findings require floor plan visual verification. Schedule analysis confirms basic door widths, elevator presence, ramp presence, and signage notes are addressed. Critical items: restroom layouts, door maneuvering clearances, and classroom turning spaces require plan review."
