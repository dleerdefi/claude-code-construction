# IBC Egress Compliance Ground Truth - Holabird Academy PK-8
# Source: A-1.1 through A-1.3 (First Floor Plans), A-3.2 (Door Schedule)
# Project: Holabird Academy, Baltimore MD
# Occupancy: E (Educational), some A-2 (Assembly - Gymnasium, Dining)
# Construction Type: Per structural drawings
# Sprinklered: Yes (Division 21 Fire Suppression present in MEP set)
# Verification: schedule-derived + code-calculated, floor-plan-visual-pending

project:
  name: "Holabird Academy PK-8"
  location: "Baltimore, Maryland"
  jurisdiction: "Maryland State Building Code (IBC 2015 with MD amendments)"
  occupancy_primary: "E - Educational"
  occupancy_secondary: "A-2 - Assembly (Gymnasium, Dining)"
  sprinklered: true
  stories: 2
  area_sf: 95000

applicable_codes:
  - "IBC 2015 (Maryland adopted edition)"
  - "NFPA 101 Life Safety Code"
  - "Maryland Building Performance Standards (COMAR 09.12.01)"

findings:
  - id: CC-E001
    area: Egress
    code_ref: "IBC 2015 Table 1004.5"
    requirement: "Educational occupancy load factor: 20 SF net per occupant for classrooms, 5 SF net for assembly concentrated seating"
    observed: "Gymnasium 1500 at approx 6,000 SF assembly use = ~1,200 occupants concentrated; Dining 1300 at assembly use"
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Gymnasium and dining areas may require assembly occupancy calculations. Verify actual SF from floor plan dimensions."

  - id: CC-E002
    area: Egress
    code_ref: "IBC 2015 Section 1006.3.1, Table 1006.3.1"
    requirement: "Spaces with occupant load >500 require minimum 3 exits; >1000 require 4 exits"
    observed: "Gymnasium has doors 1500, 1500B, 1500C, 1500D, X7, X8 — at least 6 door openings"
    status: COMPLIANT
    severity: INFO
    notes: "Gymnasium appears to have adequate number of exits based on door schedule"

  - id: CC-E003
    area: Egress
    code_ref: "IBC 2015 Section 1005.1"
    requirement: "Exit door minimum width 32 inches clear; corridors serving >60 occupants must be 44 inches minimum"
    observed: "Standard classroom doors are 3'-0\" (36\") clear — compliant. Corridor doors C100 at 3'-0\". Stair doors ST11, ST12 at 8'-0\" pairs."
    status: COMPLIANT
    severity: INFO
    notes: "All standard doors meet minimum clear width. Double-check corridor widths on floor plan."

  - id: CC-E004
    area: Egress
    code_ref: "IBC 2015 Section 1017.2, Table 1017.2"
    requirement: "Travel distance to exit: 250 feet max (sprinklered, E occupancy)"
    observed: "Cannot verify from door schedule alone — requires floor plan measurement"
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Classroom wings 1800-1900 series (PK-2) are at building extremities. Measure travel distance from farthest classroom to nearest exit."

  - id: CC-E005
    area: Egress
    code_ref: "IBC 2015 Section 1020.2"
    requirement: "Dead-end corridors: 20 feet max (50 feet if sprinklered)"
    observed: "Cannot verify from schedule — requires floor plan review"
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Check classroom wing corridors C180, C190 for dead-end conditions"

  - id: CC-E006
    area: Egress - Fire Ratings
    code_ref: "IBC 2015 Table 716.5"
    requirement: "Doors in fire-rated assemblies must have ratings: 90-min wall = 90-min door; 60-min wall = 45-min door (20-min for corridors)"
    observed: "Door schedule shows 21 fire-rated doors: 5 at 90-min (doors 1404, 1405, 2101, 2207, ST11), 16 at 60-min (stairs, electrical, science lab)"
    status: COMPLIANT
    severity: INFO
    notes: "Fire ratings appear consistent. 90-min doors are at mechanical/electrical rooms. 60-min doors at stair enclosures and rated corridors."

  - id: CC-E007
    area: Egress - Stair Enclosures
    code_ref: "IBC 2015 Section 1023.2"
    requirement: "Stair enclosures must be minimum 2-hour fire-rated construction in buildings 4+ stories; 1-hour in buildings under 4 stories"
    observed: "6 stair locations identified (ST6, ST11/12, ST21/22, ST31/32, ST42, ST51/52). Stair doors are 60-min rated."
    status: COMPLIANT
    severity: INFO
    notes: "2-story building requires 1-hour stair enclosures. 60-min door ratings are consistent with 1-hour enclosure."

  - id: CC-E008
    area: Egress - Hardware
    code_ref: "IBC 2015 Section 1010.1.10"
    requirement: "Panic hardware required on doors serving assembly occupancy with occupant load >50"
    observed: "Gymnasium doors (1500 series) and dining doors (1300A, 1300B) should have panic hardware. Hardware sets 325, 445 — verify these include panic devices."
    status: REVIEW_NEEDED
    severity: MEDIUM
    notes: "Cross-check hardware sets 325 (gymnasium) and 445 (dining) against Division 08 71 00 hardware specification for panic device inclusion."

summary:
